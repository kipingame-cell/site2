# Пример конфига nginx для домена destiny_matrix
# Вариант А: проксировать на node server.js (рекомендуется — /health для мониторинга)

server {
    listen 80;
    server_name destiny_matrix.example.com;   # ← замени на свой домен

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

