name: Import DB from site repo
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/kipingame-cell/site.git /tmp/site
      - run: |
          set -e
          SRC=/tmp/site/matrix_v2/matrix/js/database
          test -d "$SRC"
          mkdir -p public/db
          rsync -a --delete "$SRC/" public/db/
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/db
          git diff --cached --quiet || (git commit -m "chore: импорт базы трактовок из site" && git push)
          
